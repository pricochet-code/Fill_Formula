<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Système Médical Expert - Générateur de Documents</title>
    
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/downloadjs@1.4.7/download.js"></script>
    
    <style>
        :root { --blue: #2c3e50; --accent: #2980b9; --orange: #e67e22; --bg: #f4f7f6; --border: #dcdde1; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--blue); padding: 20px; line-height: 1.4; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        header { text-align: center; border-bottom: 3px solid var(--accent); margin-bottom: 30px; padding-bottom: 10px; }
        h1 { margin: 0; text-transform: uppercase; font-size: 1.4rem; }

        fieldset { border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 20px; }
        legend { font-weight: bold; color: var(--accent); padding: 0 10px; text-transform: uppercase; font-size: 0.8rem; }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .span-2 { grid-column: span 2; }
        .span-3 { grid-column: span 3; }
        .span-4 { grid-column: span 4; }

        .field { display: flex; flex-direction: column; }
        label { font-size: 0.7rem; font-weight: 700; margin-bottom: 4px; color: #666; }
        input, select, textarea { padding: 10px; border: 1px solid var(--border); border-radius: 5px; font-size: 0.9rem; text-transform: uppercase; }
        input:disabled, textarea:disabled { background: #f1f2f6; color: #999; }

        /* Groupes de cases à cocher */
        .check-row { display: flex; flex-wrap: wrap; gap: 12px; background: #f9f9f9; padding: 10px; border-radius: 5px; align-items: center; }
        .check-item { display: flex; align-items: center; gap: 5px; font-size: 0.85rem; font-weight: 600; }

        /* Style spécifique pour le champ Docteur */
        .doc-wrap { position: relative; display: flex; align-items: center; }
        .doc-prefix { position: absolute; left: 10px; font-weight: bold; color: var(--accent); }
        .doc-input { padding-left: 40px !important; }

        .action-panel { background: #fff3e0; border: 2px solid var(--orange); padding: 25px; border-radius: 12px; text-align: center; margin-top: 20px; }
        .doc-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; text-align: left; margin-bottom: 20px; }
        .btn-gen { background: var(--orange); color: white; border: none; padding: 15px 40px; font-size: 1.1rem; font-weight: bold; border-radius: 50px; cursor: pointer; transition: 0.3s; width: 100%; }
        .btn-gen:hover { background: #d35400; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container">
    <header><h1>Réservoir de Données Patient & Générateur</h1></header>

    <fieldset>
        <legend>1. État Civil & Régime</legend>
        <div class="grid">
            <div class="field"><label>Nom</label><input type="text" id="nom"></div>
            <div class="field"><label>Prénom</label><input type="text" id="prenom"></div>
            <div class="field"><label>Âge</label><input type="text" id="age"></div>
            <div class="field">
                <label>Genre</label>
                <select id="genre"><option value="HOMME">HOMME</option><option value="FEMME">FEMME</option><option value="ENFANT">ENFANT</option></select>
            </div>
            <div class="field"><label>Téléphone 1</label><input type="text" id="tel1"></div>
            <div class="field"><label>Téléphone 2</label><input type="text" id="tel2"></div>
            <div class="field">
                <label>Régime</label>
                <select id="regime" onchange="toggleInput('regime', 'regime_autre', 'AUTRE')">
                    <option value="MA">MA</option><option value="RM">RM</option><option value="FM">FM</option>
                    <option value="SS">SS</option><option value="CP">CP</option><option value="AUTRE">AUTRE</option>
                </select>
            </div>
            <div class="field"><label>Précisez Régime</label><input type="text" id="regime_autre" disabled></div>
            <div class="field span-4"><label>Adresse</label><input type="text" id="adresse"></div>
        </div>
    </fieldset>

    <fieldset>
        <legend>2. Antécédents, Traitement & Évolution</legend>
        <div class="grid">
            <div class="field span-2">
                <label>Antécédents Médicaux</label>
                <div class="check-row">
                    <label class="check-item"><input type="checkbox" id="atcd_diabete"> DIABÈTE</label>
                    <label class="check-item"><input type="checkbox" id="atcd_hta"> HTA</label>
                    <label class="check-item"><input type="checkbox" id="atcd_hypo"> HYPOTHYROÏDIE</label>
                    <label class="check-item"><input type="checkbox" id="atcd_check_autre" onchange="toggleCheck('atcd_check_autre', 'atcd_autre_txt')"> AUTRE</label>
                </div>
                <input type="text" id="atcd_autre_txt" placeholder="PRÉCISEZ AUTRE ATCD" style="margin-top:8px" disabled>
            </div>
            <div class="field span-2"><label>Traitement en cours</label><textarea id="traitement" rows="4"></textarea></div>
            <div class="field span-2"><label>Motif de Consultation</label><textarea id="motif" rows="3"></textarea></div>
            <div class="field span-2"><label>Évolution</label><textarea id="evolution" rows="3"></textarea></div>
        </div>
    </fieldset>

    <fieldset>
        <legend>3. Imagerie & Diagnostic</legend>
        <div class="grid">
            <div class="field span-2">
                <label>Imagerie</label>
                <div class="check-row" style="flex-direction: column; align-items: flex-start;">
                    <div style="display:flex; width:100%; gap:10px; align-items:center">
                        <label class="check-item" style="width:70px"><input type="checkbox" id="check_tdm"> TDM</label>
                        <input type="text" id="tdm_region" placeholder="RÉGION TDM" style="flex:1">
                    </div>
                    <div style="display:flex; width:100%; gap:10px; align-items:center; margin-top:5px">
                        <label class="check-item" style="width:70px"><input type="checkbox" id="check_irm"> IRM</label>
                        <input type="text" id="irm_region" placeholder="RÉGION IRM" style="flex:1">
                    </div>
                </div>
            </div>
            <div class="field span-2"><label>Diagnostic Retenu</label><textarea id="diagnostic" rows="4"></textarea></div>
        </div>
    </fieldset>

    <fieldset>
        <legend>4. Détails Opératoires</legend>
        <div class="grid">
            <div class="field span-2"><label>Intervention Programmée</label><input type="text" id="interv"></div>
            <div class="field">
                <label>Position Opératoire</label>
                <select id="pos_op">
                    <option value="DD">DÉCUBITUS DORSAL (DD)</option>
                    <option value="DV">DÉCUBITUS VENTRAL (DV)</option>
                    <option value="DL">DÉCUBITUS LATÉRAL (DL)</option>
                    <option value="ASSISE">POSITION ASSISE</option>
                </select>
            </div>
            <div class="field">
                <label>Saignement Estimé</label>
                <div class="check-row">
                    <label class="check-item"><input type="radio" name="saigne" value="MINIME"> MINIME</label>
                    <label class="check-item"><input type="radio" name="saigne" value="MOYEN"> MOYEN</label>
                    <label class="check-item"><input type="radio" name="saigne" value="ABONDANT"> ABONDANT</label>
                </div>
            </div>
            <div class="field span-2"><label>Résumé Intervention</label><textarea id="resume_op" rows="2"></textarea></div>
            <div class="field span-2"><label>Suites Opératoires</label><textarea id="suites_op" rows="2"></textarea></div>
            <div class="field span-2"><label>Étude Anatomopathologique</label><input type="text" id="anapath"></div>
            <div class="field span-2">
                <label>Médecin Responsable</label>
                <div class="doc-wrap">
                    <span class="doc-prefix">DR.</span>
                    <input type="text" id="medecin" class="doc-input">
                </div>
            </div>
        </div>
    </fieldset>

    <section class="action-panel">
        <div class="doc-list">
            <label class="check-item"><input type="checkbox" id="checkPA" checked> PROPOSITION ADMISSION</label>
            <label class="check-item"><input type="checkbox" id="checkBPO" checked> BILAN PRÉ-OP</label>
            <label class="check-item"><input type="checkbox" id="checkDI"> DEMANDE IMAGERIE</label>
        </div>
        <button class="btn-gen" onclick="generer()">🚀 GÉNÉRER LES DOCUMENTS SÉLECTIONNÉS</button>
    </section>
</div>

<script>
    const { PDFDocument, rgb, StandardFonts } = PDFLib;

    // --- LOGIQUE INTERFACE ---
    function toggleInput(selectId, targetId, value) {
        document.getElementById(targetId).disabled = document.getElementById(selectId).value !== value;
    }
    function toggleCheck(checkId, targetId) {
        document.getElementById(targetId).disabled = !document.getElementById(checkId).checked;
    }

    const getV = (id) => document.getElementById(id).value.trim().toUpperCase();

    // --- CŒUR DE GÉNÉRATION ---
    async function generer() {
        // Collecte des Antécédents (Concaténation)
        let atcdList = [];
        if(document.getElementById('atcd_diabete').checked) atcdList.push("DIABÈTE");
        if(document.getElementById('atcd_hta').checked) atcdList.push("HTA");
        if(document.getElementById('atcd_hypo').checked) atcdList.push("HYPOTHYROÏDIE");
        if(document.getElementById('atcd_check_autre').checked) atcdList.push(getV('atcd_autre_txt'));

        const data = {
            nom: getV('nom'), prenom: getV('prenom'), age: getV('age'), genre: getV('genre'),
            tels: `${getV('tel1')} / ${getV('tel2')}`, adresse: getV('adresse'),
            regime: getV('regime') === "AUTRE" ? getV('regime_autre') : getV('regime'),
            atcd: atcdList.join(', '), 
            traitement: getV('traitement'), motif: getV('motif'), evolution: getV('evolution'),
            diag: getV('diagnostic'), interv: getV('interv'), medecin: "DR. " + getV('medecin'),
            date: new Date().toLocaleDateString('fr-FR'),
            tdm: document.getElementById('check_tdm').checked, tdm_reg: getV('tdm_region'),
            irm: document.getElementById('check_irm').checked, irm_reg: getV('irm_region'),
            anapath: getV('anapath')
        };

        if(document.getElementById('checkPA').checked) await buildPA(data);
        if(document.getElementById('checkBPO').checked) await buildBPO(data);
        if(document.getElementById('checkDI').checked) await buildDI(data);
    }

    // --- LOGIQUE PA ---
    async function buildPA(d) {
        try {
            const bytes = await fetch('PA.pdf').then(res => res.arrayBuffer());
            const doc = await PDFDocument.load(bytes);
            const page = doc.getPages()[0];
            const draw = (t, x, y) => { if(t) page.drawText(t, { x, y, size: 10 }) };
            
            draw(d.date, 441, 688);
            draw(d.nom, 195, 624); draw(d.prenom, 213, 593);
            draw(d.age, 195, 561); draw(d.tels, 420, 561);
            draw(d.adresse, 215, 530);
            draw(d.medecin, 392, 129);

            const res = await doc.save();
            download(res, `PA_${d.nom}.pdf`, "application/pdf");
        } catch(e) { console.error(e); }
    }

    // --- LOGIQUE BPO ---
    async function buildBPO(d) {
        try {
            const bytes = await fetch('BPO.pdf').then(res => res.arrayBuffer());
            const doc = await PDFDocument.load(bytes);
            const page = doc.getPages()[0];
            const font = await doc.embedFont(StandardFonts.Helvetica);
            
            const fullP = `${d.prenom} ${d.nom}`;
            [231, 484, 751].forEach(x => page.drawText(d.date, { x, y: 470, size: 10, font }));
            [70, 341, 615].forEach(x => page.drawText(fullP, { x, y: 295, size: 10, font }));
            
            const w = font.widthOfTextAtSize(d.medecin, 10);
            [282, 549, 816].forEach(x => page.drawText(d.medecin, { x: x - w, y: 84, size: 10, font }));

            const res = await doc.save();
            download(res, `BPO_${d.nom}.pdf`, "application/pdf");
        } catch(e) { console.error(e); }
    }

    // --- LOGIQUE DI ---
    async function buildDI(d) {
        try {
            const bytes = await fetch('DI.pdf').then(res => res.arrayBuffer());
            const doc = await PDFDocument.load(bytes);
            const page = doc.getPages()[0];
            const draw = (t, x, y) => { if(t) page.drawText(t.toString(), { x, y, size: 10 }) };

            draw(d.date, 465, 688);
            draw(`${d.nom} ${d.prenom}`, 248, 597);

            if(d.tdm) { draw("X", 248, 597); draw(d.tdm_reg, 318, 575); }
            if(d.irm) { draw("X", 255, 540); draw(d.irm_reg, 318, 543); }

            draw(d.genre, 243, 458); draw(d.age, 390, 458);
            draw(d.atcd, 212, 434); draw(d.motif, 218, 410);
            draw(d.diag, 250, 196); draw(d.medecin, 402, 70);

            const res = await doc.save();
            download(res, `DI_${d.nom}.pdf`, "application/pdf");
        } catch(e) { console.error(e); }
    }
</script>
</body>
</html>
