<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>BPO - Solution de la dernière chance</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/downloadjs@1.4.7/download.js"></script>
    <style>
        body { font-family: sans-serif; padding: 50px; text-align: center; background: #2c3e50; color: white; }
        .box { background: white; color: #333; padding: 30px; border-radius: 10px; display: inline-block; }
        input { display: block; width: 300px; margin: 10px auto; padding: 10px; }
        button { background: #e67e22; color: white; border: none; padding: 15px 30px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h2>Correction BPO Paysage</h2>
    <input type="text" id="nom" placeholder="NOM PATIENT">
    <input type="text" id="medecin" placeholder="NOM MEDECIN">
    <button onclick="genererBPO()">GÉNÉRER LE BPO</button>
</div>

<script>
    const { PDFDocument, rgb, StandardFonts, degrees } = PDFLib;

    async function genererBPO() {
        const nom = document.getElementById('nom').value.toUpperCase();
        const medecin = document.getElementById('medecin').value.toUpperCase();
        const dateStr = new Date().toLocaleDateString('fr-FR');

        try {
            const bytes = await fetch('BPO.pdf').then(res => res.arrayBuffer());
            const pdfDoc = await PDFDocument.load(bytes);
            const page = pdfDoc.getPages()[0];
            const font = await pdfDoc.embedFont(StandardFonts.Helvetica);
            
            // On récupère la taille réelle pour voir si le PDF est "couché"
            const { width, height } = page.getSize();

            // FONCTION DE DESSIN AVEC ROTATION 0
            // Si ça ne marche toujours pas, on changera "rotate: degrees(0)" en "rotate: degrees(90)"
            const draw = (txt, x, y, alignRight = false) => {
                let finalX = x;
                const size = 10;
                if(alignRight) {
                    finalX = x - font.widthOfTextAtSize(txt, size);
                }
                
                page.drawText(txt, {
                    x: finalX,
                    y: y, 
                    size: size,
                    font: font,
                    color: rgb(0,0,0),
                    rotate: degrees(0) // On reste à 0 pour l'instant
                });
            };

            // TEST DE POSITIONNEMENT MANUEL (Basé sur votre image)
            // Si Tunis est en haut et Signature en bas :
            // Essayons des valeurs Y très éloignées pour voir qui gagne.
            
            // DATE tout en haut (on essaie une valeur très haute)
            draw(dateStr, 231, 550); 
            draw(dateStr, 484, 550);
            draw(dateStr, 751, 550);

            // MEDECIN tout en bas (on essaie une valeur très basse)
            draw(medecin, 282, 50, true); 
            draw(medecin, 549, 50, true);
            draw(medecin, 816, 50, true);

            const result = await pdfDoc.save();
            download(result, `BPO_TEST.pdf`, "application/pdf");

        } catch (e) { alert(e.message); }
    }
</script>

</body>
</html>
