<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Clinique - PA & BPO</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/downloadjs@1.4.7/download.js"></script>
    <style>
        :root { --blue: #2980b9; --dark: #2c3e50; --green: #27ae60; --bg: #f5f6fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--dark); border-bottom: 3px solid var(--blue); padding-bottom: 10px; margin-bottom: 30px; }
        
        .section { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; padding: 20px; border: 1px solid #dee2e6; border-radius: 8px; background: #fff; }
        .section-title { grid-column: span 3; font-weight: bold; color: var(--blue); text-transform: uppercase; font-size: 0.9em; border-bottom: 1px solid #eee; margin-bottom: 10px; padding-bottom: 5px; }
        
        .field { display: flex; flex-direction: column; }
        .full { grid-column: span 3; }
        .half { grid-column: span 2; }
        
        label { font-size: 0.85em; margin-bottom: 4px; font-weight: 600; color: #444; }
        input, textarea, select { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95em; text-transform: uppercase; }
        
        .checkbox-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; padding: 10px; background: #f8f9fa; border-radius: 4px; }
        .check-item { display: flex; align-items: center; font-size: 0.85em; gap: 5px; cursor: pointer; }

        .selector-box { background: #e3f2fd; padding: 20px; border-radius: 8px; border: 2px solid var(--blue); margin-top: 20px; text-align: center; }
        .btn { background: var(--green); color: white; padding: 15px 40px; border: none; border-radius: 50px; font-size: 1.1em; cursor: pointer; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 10px rgba(39,174,96,0.3); }
        .btn:hover { background: #219150; transform: scale(1.02); }
    </style>
</head>
<body>

<div class="container">
    <h1>🏥 Système de Gestion Chirurgicale</h1>

    <div class="section">
        <div class="section-title">1. Identification du Patient</div>
        <div class="field"><label>Nom</label><input type="text" id="nom"></div>
        <div class="field"><label>Prénom</label><input type="text" id="prenom"></div>
        <div class="field"><label>Âge</label><input type="text" id="age"></div>
        <div class="field"><label>Téléphone</label><input type="text" id="tel"></div>
        <div class="field half"><label>Adresse</label><input type="text" id="adresse"></div>
        <div class="field"><label>Régime</label>
            <select id="regime">
                <option value="M">M</option><option value="FM">FM</option><option value="RM">RM</option>
                <option value="SS">SS</option><option value="CP">CP</option><option value="Autre">AUTRE</option>
            </select>
        </div>
        <div class="field"><label>Précision Régime</label><input type="text" id="regime_autre"></div>
    </div>

    <div class="section">
        <div class="section-title">2. Antécédents & Traitements</div>
        <div class="field full">
            <label>Antécédents</label>
            <div class="checkbox-grid">
                <label class="check-item"><input type="checkbox" class="atcd" value="HTA"> HTA</label>
                <label class="check-item"><input type="checkbox" class="atcd" value="DIABETE"> DIABÈTE</label>
                <label class="check-item"><input type="checkbox" class="atcd" value="AVC"> AVC</label>
                <label class="check-item"><input type="checkbox" class="atcd" value="IDM"> IDM</label>
                <label class="check-item"><input type="checkbox" class="atcd" value="CORONARIEN"> CORONARIEN</label>
            </div>
            <input type="text" id="atcd_autre" placeholder="AUTRES ANTECEDENTS..." style="margin-top:10px;">
        </div>
        <div class="field full"><label>Traitement actuel</label><textarea id="traitement" rows="2"></textarea></div>
    </div>

    <div class="section">
        <div class="section-title">3. Données de l'Intervention</div>
        <div class="field full"><label>Motif de consultation</label><textarea id="motif"></textarea></div>
        <div class="field full"><label>Diagnostic retenu</label><textarea id="diag"></textarea></div>
        <div class="field full"><label>Intervention programmée</label><textarea id="interv"></textarea></div>
        <div class="field"><label>Type d'admission</label>
            <select id="urgence"><option value="a froid">A FROID</option><option value="en urgence">EN URGENCE</option></select>
        </div>
        <div class="field half"><label>Médecin Responsable</label><input type="text" id="medecin"></div>
    </div>

    <div class="selector-box">
        <h3 style="margin-top:0; color:var(--blue)">CHOIX DU DOCUMENT À GÉNÉRER</h3>
        <div style="margin-bottom: 20px;">
            <label style="margin-right:20px; font-weight:bold; cursor:pointer">
                <input type="radio" name="docType" value="PA" checked> Proposition d'Admission (PA)
            </label>
            <label style="font-weight:bold; cursor:pointer">
                <input type="radio" name="docType" value="BPO"> Bilan Pré-Opératoire (BPO)
            </label>
        </div>
        <button class="btn" onclick="traiterDocument()">GÉNÉRER LE DOCUMENT SELECTIONNÉ</button>
    </div>
</div>

<script>
    const { PDFDocument, rgb } = PDFLib;

    async function traiterDocument() {
        const type = document.querySelector('input[name="docType"]:checked').value;
        if(type === "PA") {
            await genererPA();
        } else if(type === "BPO") {
            await genererBPO();
        }
    }

    // --- FORMULAIRE PA ---
    async function genererPA() {
        const val = (id) => document.getElementById(id).value.trim().toUpperCase();
        const data = {
            nom: val('nom'), prenom: val('prenom'), age: val('age'), tel: val('tel'),
            adresse: val('adresse'), regime: document.getElementById('regime').value,
            regime_autre: val('regime_autre'), motif: val('motif'), diag: val('diag'),
            interv: val('interv'), urgence: document.getElementById('urgence').value,
            medecin: val('medecin'), date: new Date().toLocaleDateString('fr-FR')
        };

        try {
            const bytes = await fetch('PA.pdf').then(res => res.arrayBuffer());
            const pdfDoc = await PDFDocument.load(bytes);
            const page = pdfDoc.getPages()[0];
            const { height } = page.getSize();

            const draw = (text, x, y, size = 10) => {
                if(text) page.drawText(text.toString().toUpperCase(), { x, y: height - y, size, color: rgb(0,0,0) });
            };

            draw(data.date, 441, 688);
            draw(data.nom, 195, 624);
            draw(data.prenom, 213, 593);
            draw(data.age, 195, 561); draw(data.tel, 420, 561);
            draw(data.adresse, 215, 530);

            const regPos = { "M": 218, "FM": 253, "RM": 293, "SS": 335, "CP": 372 };
            if (regPos[data.regime]) draw("X", regPos[data.regime], 495, 12);
            else if (data.regime === "Autre") draw(data.regime_autre, 459, 498);

            const longT = (t, x1, y1, x2, y2) => {
                if(!t) return;
                if(t.length <= 55) draw(t, x1, y1);
                else { draw(t.substring(0,55), x1, y1); draw(t.substring(55, 110), x2, y2); }
            };
            longT(data.motif, 279, 465, 160, 434);
            longT(data.diag, 259, 402, 160, 369);
            longT(data.interv, 301, 339, 160, 307);

            if (data.urgence === "en urgence") draw("X", 352, 241, 12);
            else draw("X", 447, 242, 12);

            draw(data.medecin, 392, 129);

            const result = await pdfDoc.save();
            download(result, `PA_${data.nom}.pdf`, "application/pdf");
        } catch (e) { alert("Erreur PA.pdf : " + e.message); }
    }

    // --- FORMULAIRE BPO ---
    async function genererBPO() {
        const val = (id) => document.getElementById(id).value.trim().toUpperCase();
        const data = {
            nomPrenom: val('prenom') + " " + val('nom'),
            medecin: val('medecin'),
            date: new Date().toLocaleDateString('fr-FR')
        };

        try {
            const bytes = await fetch('BPO.pdf').then(res => res.arrayBuffer());
            const pdfDoc = await PDFDocument.load(bytes);
            const page = pdfDoc.getPages()[0];
            const { height } = page.getSize();

            // Utilisation de height - y pour correspondre à vos coordonnées d'outil en ligne
            const draw = (text, x, y, size = 10) => {
                if(text) page.drawText(text.toString().toUpperCase(), { x, y: height - y, size, color: rgb(0,0,0) });
            };

            // Écriture de la Date (3 zones)
            draw(data.date, 231, 470);
            draw(data.date, 484, 470);
            draw(data.date, 751, 470);

            // Écriture Nom/Prénom (3 zones)
            draw(data.nomPrenom, 70, 295);
            draw(data.nomPrenom, 341, 295);
            draw(data.nomPrenom, 615, 294);

            // Écriture Médecin (3 zones)
            draw(data.medecin, 131, 89);
            draw(data.medecin, 345, 89);
            draw(data.medecin, 577, 87);

            const result = await pdfDoc.save();
            download(result, `BPO_${val('nom')}.pdf`, "application/pdf");
        } catch (e) { alert("Erreur BPO.pdf : " + e.message); }
    }
</script>
</body>
</html>
