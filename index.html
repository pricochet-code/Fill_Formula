<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Système de Gestion Chirurgicale - Correction Axe Y</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/downloadjs@1.4.7/download.js"></script>
    <style>
        :root { --blue: #2980b9; --dark: #2c3e50; --green: #27ae60; --bg: #f5f6fa; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--dark); border-bottom: 3px solid var(--blue); padding-bottom: 10px; margin-bottom: 30px; }
        
        .section { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; padding: 20px; border: 1px solid #dee2e6; border-radius: 8px; background: #fff; }
        .section-title { grid-column: span 3; font-weight: bold; color: var(--blue); text-transform: uppercase; font-size: 0.9em; border-bottom: 1px solid #eee; margin-bottom: 10px; padding-bottom: 5px; }
        
        .field { display: flex; flex-direction: column; }
        .full { grid-column: span 3; }
        .half { grid-column: span 2; }
        
        label { font-size: 0.85em; margin-bottom: 4px; font-weight: 600; color: #444; }
        input, textarea, select { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95em; text-transform: uppercase; }
        
        .btn-box { text-align: center; margin-top: 30px; }
        .btn { background: var(--green); color: white; padding: 18px 60px; border: none; border-radius: 50px; font-size: 1.2em; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 10px rgba(39,174,96,0.3); }
        .btn:hover { background: #219150; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container">
    <h1>🏥 Dossier Patient (Axe Y Standard PDF)</h1>

    <div class="section">
        <div class="section-title">Identification du Patient</div>
        <div class="field"><label>Nom</label><input type="text" id="nom"></div>
        <div class="field"><label>Prénom</label><input type="text" id="prenom"></div>
        <div class="field"><label>Âge</label><input type="text" id="age"></div>
        <div class="field"><label>Téléphone</label><input type="text" id="tel"></div>
        <div class="field half"><label>Adresse</label><input type="text" id="adresse"></div>
        <div class="field"><label>Régime</label>
            <select id="regime">
                <option value="M">M</option>
                <option value="FM">FM</option>
                <option value="RM">RM</option>
                <option value="SS">SS</option>
                <option value="CP">CP</option>
                <option value="Autre">AUTRE</option>
            </select>
        </div>
        <div class="field"><label>Si Autre</label><input type="text" id="regime_autre"></div>
    </div>

    <div class="section">
        <div class="section-title">Données Médicales</div>
        <div class="field full"><label>Motif de consultation</label><textarea id="motif" rows="2"></textarea></div>
        <div class="field full"><label>Diagnostic retenu</label><textarea id="diag" rows="2"></textarea></div>
        <div class="field full"><label>Intervention programmée</label><textarea id="interv" rows="2"></textarea></div>
        <div class="field"><label>Type d'admission</label>
            <select id="urgence">
                <option value="a froid">A FROID</option>
                <option value="en urgence">EN URGENCE</option>
            </select>
        </div>
        <div class="field half">
            <label>Nom du Médecin (Signature)</label>
            <input type="text" id="medecin" placeholder="DR. ...">
        </div>
    </div>

    <div class="btn-box">
        <button class="btn" onclick="genererPA()">Générer le PDF (PA.pdf)</button>
    </div>
</div>

<script>
    const { PDFDocument, rgb } = PDFLib;

    // Fonction pour les textes longs (Axe Y : 0 = Bas)
    function dessinerTexteLong(page, texte, x1, y1, x2, y2) {
        if (!texte) return;
        const texteMaj = texte.toString().toUpperCase();
        const maxChar = 55; 
        
        if (texteMaj.length <= maxChar) {
            page.drawText(texteMaj, { x: x1, y: y1, size: 10 });
        } else {
            const ligne1 = texteMaj.substring(0, maxChar);
            const ligne2 = texteMaj.substring(maxChar, maxChar * 2);
            page.drawText(ligne1, { x: x1, y: y1, size: 10 });
            page.drawText(ligne2, { x: x2, y: y2, size: 10 });
        }
    }

    async function genererPA() {
        const val = (id) => document.getElementById(id).value.trim().toUpperCase();
        
        const data = {
            nom: val('nom'),
            prenom: val('prenom'),
            age: val('age'),
            tel: val('tel'),
            adresse: val('adresse'),
            regime: document.getElementById('regime').value,
            regime_autre: val('regime_autre'),
            motif: val('motif'),
            diag: val('diag'),
            interv: val('interv'),
            urgence: document.getElementById('urgence').value,
            medecin: val('medecin'),
            date: new Date().toLocaleDateString('fr-FR')
        };

        try {
            // Le fichier doit être à la racine du dépôt GitHub
            const url = 'PA.pdf'; 
            const response = await fetch(url);
            
            if(!response.ok) throw new Error("Fichier PA.pdf non trouvé. Vérifiez qu'il est bien à côté de index.html.");
            
            const bytes = await response.arrayBuffer();
            const pdfDoc = await PDFDocument.load(bytes);
            const page = pdfDoc.getPages()[0];

            // Fonction Helper (Y direct : 0 = BAS, 842 = HAUT)
            const draw = (text, x, y, size = 10) => {
                if(text) {
                    page.drawText(text.toString().toUpperCase(), { 
                        x: x, 
                        y: y, 
                        size: size, 
                        color: rgb(0,0,0) 
                    });
                }
            };

            // Écriture selon vos coordonnées
            // Haut de page
            draw(data.date, 441, 688);
            draw(data.nom, 195, 624);
            draw(data.prenom, 213, 593);
            draw(data.age, 195, 561);
            draw(data.tel, 420, 561);
            draw(data.adresse, 215, 530);

            // Milieu de page (Régime)
            const regPos = { "M": 218, "FM": 253, "RM": 293, "SS": 335, "CP": 372 };
            if (regPos[data.regime]) {
                draw("X", regPos[data.regime], 495, 12);
            } else if (data.regime === "Autre") {
                draw(data.regime_autre, 459, 498);
            }

            // Zones de texte (Motif, Diag, Interv)
            dessinerTexteLong(page, data.motif, 279, 465, 160, 434);
            dessinerTexteLong(page, data.diag, 259, 402, 160, 369);
            dessinerTexteLong(page, data.interv, 301, 339, 160, 307);

            // Type Admission
            if (data.urgence === "en urgence") {
                draw("X", 352, 241, 12);
            } else {
                draw("X", 447, 242, 12);
            }

            // Bas de page (Signature Médecin)
            draw(data.medecin, 392, 129);

            const result = await pdfDoc.save();
            download(result, `PA_${data.nom}.pdf`, "application/pdf");

        } catch (e) {
            alert("Erreur : " + e.message);
        }
    }
</script>
</body>
</html>
