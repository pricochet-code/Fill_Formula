<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plateforme de Gestion Médicale - Documents Pré-Opératoires</title>
    
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/downloadjs@1.4.7/download.js"></script>
    
    <style>
        :root { --primary: #2c3e50; --accent: #2980b9; --warn: #e67e22; --light-bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--light-bg); margin: 0; padding: 40px; }
        .app-container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        
        header { text-align: center; margin-bottom: 40px; border-bottom: 2px solid #eee; padding-bottom: 20px; }
        h1 { color: var(--primary); margin: 0; font-size: 1.8rem; text-transform: uppercase; letter-spacing: 1px; }
        
        fieldset { border: 1px solid #ddd; border-radius: 10px; padding: 25px; margin-bottom: 25px; }
        legend { font-weight: bold; color: var(--accent); padding: 0 10px; text-transform: uppercase; font-size: 0.85rem; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .col-span-3 { grid-column: span 3; }
        .col-span-2 { grid-column: span 2; }
        
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 0.8rem; font-weight: 700; margin-bottom: 6px; color: #666; }
        input, textarea, select { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.95rem; transition: border 0.3s; text-transform: uppercase; }
        input:focus { border-color: var(--accent); outline: none; }
        
        .doc-selection { background: #fff9f0; border: 2px dashed var(--warn); padding: 30px; border-radius: 12px; text-align: center; }
        .doc-selection h3 { color: var(--warn); margin-top: 0; }
        
        .btn-submit { background: var(--warn); color: white; border: none; padding: 18px 60px; font-size: 1.1rem; font-weight: bold; border-radius: 50px; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(230,126,34,0.3); margin-top: 15px; }
        .btn-submit:hover { background: #d35400; transform: translateY(-2px); }
        
        .checkbox-group { display: flex; justify-content: center; gap: 30px; margin-bottom: 20px; }
        .checkbox-group label { display: flex; align-items: center; gap: 8px; font-size: 1rem; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>Interface d'Édition Médicale</h1>
    </header>

    <main id="medical-form">
        <fieldset>
            <legend>Identification du Patient</legend>
            <div class="grid">
                <div class="form-group"><label>Nom</label><input type="text" id="nom"></div>
                <div class="form-group"><label>Prénom</label><input type="text" id="prenom"></div>
                <div class="form-group"><label>Âge</label><input type="text" id="age"></div>
                <div class="form-group"><label>Téléphone</label><input type="text" id="tel"></div>
                <div class="form-group col-span-2"><label>Adresse</label><input type="text" id="adresse"></div>
                <div class="form-group"><label>Régime</label>
                    <select id="regime">
                        <option value="M">M</option><option value="FM">FM</option><option value="RM">RM</option>
                        <option value="SS">SS</option><option value="CP">CP</option><option value="Autre">AUTRE</option>
                    </select>
                </div>
                <div class="form-group col-span-2"><label>Détails Régime (si autre)</label><input type="text" id="regime_autre"></div>
            </div>
        </fieldset>

        <fieldset>
            <legend>Dossier Médical</legend>
            <div class="grid">
                <div class="form-group col-span-3"><label>Antécédents</label><input type="text" id="atcd"></div>
                <div class="form-group col-span-3"><label>Traitement Actuel</label><textarea id="traitement" rows="2"></textarea></div>
                <div class="form-group col-span-3"><label>Motif / Diagnostic</label><textarea id="motif" rows="2"></textarea></div>
                <div class="form-group col-span-3"><label>Intervention Prévue</label><textarea id="interv" rows="2"></textarea></div>
                <div class="form-group"><label>Type d'Admission</label>
                    <select id="urgence"><option value="a froid">À FROID</option><option value="en urgence">EN URGENCE</option></select>
                </div>
                <div class="form-group col-span-2"><label>Médecin Traitant</label><input type="text" id="medecin" placeholder="DR."></div>
            </div>
        </fieldset>

        <section class="doc-selection">
            <h3>Documents à Éditer</h3>
            <div class="checkbox-group">
                <label><input type="checkbox" id="checkPA" checked> Formulaire PA (Portrait)</label>
                <label><input type="checkbox" id="checkBPO" checked> Bilan BPO (Paysage)</label>
            </div>
            <button class="btn-submit" onclick="processDocuments()">GÉNÉRER LES PDF</button>
        </section>
    </main>
</div>

<script>
    const { PDFDocument, rgb, StandardFonts } = PDFLib;

    async function processDocuments() {
        const val = (id) => document.getElementById(id).value.trim().toUpperCase();
        const dateStr = new Date().toLocaleDateString('fr-FR');
        
        if (document.getElementById('checkPA').checked) await buildPA(val, dateStr);
        if (document.getElementById('checkBPO').checked) await buildBPO(val, dateStr);
    }

    async function buildPA(val, date) {
        try {
            const bytes = await fetch('PA.pdf').then(res => res.arrayBuffer());
            const doc = await PDFDocument.load(bytes);
            const page = doc.getPages()[0];
            const d = (t, x, y, s = 10) => { if(t) page.drawText(t.toString(), { x, y, size: s }) };

            d(date, 441, 688);
            d(val('nom'), 195, 624);
            d(val('prenom'), 213, 593);
            d(val('age'), 195, 561);
            d(val('adresse'), 215, 530);
            d(val('medecin'), 392, 129);

            const result = await doc.save();
            download(result, `PA_${val('nom')}.pdf`, "application/pdf");
        } catch(e) { console.error(e); }
    }

    async function buildBPO(val, date) {
        try {
            const bytes = await fetch('BPO.pdf').then(res => res.arrayBuffer());
            const doc = await PDFDocument.load(bytes);
            const page = doc.getPages()[0];
            const font = await doc.embedFont(StandardFonts.Helvetica);
            
            const patient = `${val('prenom')} ${val('nom')}`;
            const medecin = val('medecin');

            // Coordonnées Y validées : 470 (Haut), 295 (Patient), 84 (Bas)
            page.drawText(date, { x: 231, y: 470, size: 10, font });
            page.drawText(date, { x: 484, y: 470, size: 10, font });
            page.drawText(date, { x: 751, y: 470, size: 10, font });

            page.drawText(patient, { x: 70, y: 295, size: 10, font });
            page.drawText(patient, { x: 341, y: 295, size: 10, font });
            page.drawText(patient, { x: 615, y: 295, size: 10, font });

            if(medecin) {
                const textWidth = font.widthOfTextAtSize(medecin, 10);
                const pointsX = [282, 549, 816];
                pointsX.forEach(x => {
                    page.drawText(medecin, { x: x - textWidth, y: 84, size: 10, font });
                });
            }

            const result = await doc.save();
            download(result, `BPO_${val('nom')}.pdf`, "application/pdf");
        } catch(e) { alert("BPO Error: " + e.message); }
    }
</script>

</body>
</html>
