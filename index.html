<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Saisie Médicale Mobile v3.5</title>
    
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/downloadjs@1.4.7/download.js"></script>
    
    <style>
        :root { --blue: #2c3e50; --accent: #2980b9; --orange: #e67e22; --bg: #f0f2f5; --white: #ffffff; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); color: var(--blue); margin: 0; padding: 10px; 
        }

        .container { max-width: 900px; margin: auto; background: var(--white); padding: 15px; border-radius: 12px; shadow: 0 4px 12px rgba(0,0,0,0.1); }
        
        header { text-align: center; border-bottom: 3px solid var(--accent); margin-bottom: 20px; padding-bottom: 10px; }
        h1 { margin: 0; font-size: 1.2rem; text-transform: uppercase; }

        fieldset { border: 1px solid #ddd; border-radius: 8px; padding: 15px; margin-bottom: 15px; background: #fff; }
        legend { font-weight: bold; color: var(--accent); font-size: 0.8rem; text-transform: uppercase; padding: 0 8px; }

        /* Grid Responsive */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .span-2 { grid-column: span 2; }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
            .span-2 { grid-column: span 1; }
        }

        .field { display: flex; flex-direction: column; margin-bottom: 5px; }
        label { font-size: 0.75rem; font-weight: 700; margin-bottom: 5px; color: #555; }
        
        input, select, textarea { 
            padding: 12px; border: 1px solid #ccc; border-radius: 6px; 
            font-size: 16px; /* Évite le zoom auto sur iPhone */
            width: 100%; transition: 0.2s; 
        }

        input:focus { border-color: var(--accent); outline: none; background: #fdfdfd; }
        input:disabled { background: #f5f5f5; color: #999; }

        /* Groupes de boutons/checks */
        .check-row { 
            display: flex; flex-wrap: wrap; gap: 10px; background: #f9f9f9; 
            padding: 12px; border-radius: 6px; border: 1px solid #eee;
        }
        .check-item { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; font-weight: 500; }
        .check-item input { width: 20px; height: 20px; }

        /* Préfixe Dr. */
        .doc-wrap { position: relative; }
        .doc-prefix { position: absolute; left: 12px; top: 12px; font-weight: bold; color: var(--accent); }
        .doc-input { padding-left: 45px !important; }

        /* Panneau de génération */
        .action-panel { 
            background: #fff3e0; border: 2px solid var(--orange); 
            padding: 20px; border-radius: 12px; margin-top: 20px; 
        }
        .btn-gen { 
            background: var(--orange); color: white; border: none; 
            padding: 18px; font-size: 1.1rem; font-weight: bold; 
            border-radius: 8px; cursor: pointer; width: 100%;
            box-shadow: 0 4px 10px rgba(230,126,34,0.3);
        }
        .btn-gen:active { transform: scale(0.98); background: #d35400; }

        textarea { resize: none; }
    </style>
</head>
<body>

<div class="container">
    <header><h1>Dossier Patient Mobile</h1></header>

    <fieldset>
        <legend>1. État Civil & Régime</legend>
        <div class="grid">
            <div class="field"><label>Nom</label><input type="text" id="nom" autocomplete="off"></div>
            <div class="field"><label>Prénom</label><input type="text" id="prenom" autocomplete="off"></div>
            <div class="field"><label>Âge</label><input type="number" id="age"></div>
            <div class="field">
                <label>Genre</label>
                <select id="genre">
                    <option value="HOMME">HOMME</option>
                    <option value="FEMME">FEMME</option>
                    <option value="ENFANT">ENFANT</option>
                </select>
            </div>
            <div class="field"><label>Tél 1</label><input type="tel" id="tel1"></div>
            <div class="field"><label>Tél 2</label><input type="tel" id="tel2"></div>
            <div class="field">
                <label>Régime</label>
                <select id="regime" onchange="toggleInput('regime', 'regime_autre', 'AUTRE')">
                    <option value="MA">MA</option><option value="FM">FM</option><option value="RM">RM</option>
                    <option value="SS">SS</option><option value="CP">CP</option><option value="AUTRE">AUTRE</option>
                </select>
            </div>
            <div class="field"><label>Précisez Régime</label><input type="text" id="regime_autre" disabled></div>
            <div class="field span-2"><label>Adresse</label><input type="text" id="adresse"></div>
        </div>
    </fieldset>

    <fieldset>
        <legend>2. Antécédents & Diagnostic</legend>
        <div class="grid">
            <div class="field span-2">
                <label>Antécédents</label>
                <div class="check-row">
                    <label class="check-item"><input type="checkbox" id="atcd_diabete"> DIABÈTE</label>
                    <label class="check-item"><input type="checkbox" id="atcd_hta"> HTA</label>
                    <label class="check-item"><input type="checkbox" id="atcd_hypo"> HYPO</label>
                    <label class="check-item"><input type="checkbox" id="atcd_check_autre" onchange="toggleCheck('atcd_check_autre', 'atcd_autre_txt')"> AUTRE</label>
                </div>
                <input type="text" id="atcd_autre_txt" placeholder="PRÉCISEZ AUTRE" style="margin-top:8px" disabled>
            </div>
            <div class="field span-2"><label>Traitement</label><textarea id="traitement" rows="2"></textarea></div>
            <div class="field span-2"><label>Motif de Consultation</label><textarea id="motif" rows="2"></textarea></div>
            <div class="field span-2"><label>Diagnostic Retenu (PA)</label><input type="text" id="diagnostic"></div>
        </div>
    </fieldset>

    <fieldset>
        <legend>3. Bloc & Imagerie</legend>
        <div class="grid">
            <div class="field span-2">
                <label>Imagerie</label>
                <div class="check-row" style="flex-direction: column;">
                    <div style="display:flex; gap:10px; align-items:center; width: 100%;">
                        <label class="check-item" style="min-width:70px"><input type="checkbox" id="check_tdm"> TDM</label>
                        <input type="text" id="tdm_region" placeholder="Région" style="flex:1">
                    </div>
                    <div style="display:flex; gap:10px; align-items:center; width: 100%; margin-top:5px">
                        <label class="check-item" style="min-width:70px"><input type="checkbox" id="check_irm"> IRM</label>
                        <input type="text" id="irm_region" placeholder="Région" style="flex:1">
                    </div>
                </div>
            </div>
            <div class="field span-2"><label>Intervention Prévue</label><textarea id="interv" rows="2"></textarea></div>
            <div class="field span-2">
                <label>Médecin</label>
                <div class="doc-wrap">
                    <span class="doc-prefix">DR.</span>
                    <input type="text" id="medecin" class="doc-input">
                </div>
            </div>
        </div>
    </fieldset>

    <section class="action-panel">
        <div class="grid" style="margin-bottom: 15px;">
            <label class="check-item"><input type="checkbox" id="checkPA" checked> PA</label>
            <label class="check-item"><input type="checkbox" id="checkBPO" checked> BPO</label>
            <label class="check-item"><input type="checkbox" id="checkDI"> DI</label>
        </div>
        <button class="btn-gen" onclick="genererTousLesPDF()">🚀 GÉNÉRER LES PDF (TAILLE 12)</button>
    </section>
</div>

<script>
    const { PDFDocument, StandardFonts } = PDFLib;

    function toggleInput(selectId, targetId, value) { document.getElementById(targetId).disabled = document.getElementById(selectId).value !== value; }
    function toggleCheck(checkId, targetId) { document.getElementById(targetId).disabled = !document.getElementById(checkId).checked; }
    const getV = (id) => document.getElementById(id).value.trim().toUpperCase();

    async function genererTousLesPDF() {
        const d = {
            nom: getV('nom'), prenom: getV('prenom'), age: getV('age'), genre: getV('genre'),
            tels: `${getV('tel1')} / ${getV('tel2')}`, adresse: getV('adresse'),
            regime: document.getElementById('regime').value, regime_autre: getV('regime_autre'),
            motif: getV('motif'), diag: getV('diagnostic'), interv: getV('interv'),
            medecin: "DR. " + getV('medecin'), date: new Date().toLocaleDateString('fr-FR'),
            tdm: document.getElementById('check_tdm').checked, tdm_reg: getV('tdm_region'),
            irm: document.getElementById('check_irm').checked, irm_reg: getV('irm_region')
        };

        if(!d.nom) { alert("Veuillez saisir au moins le NOM"); return; }

        if(document.getElementById('checkPA').checked) await buildPA(d);
        if(document.getElementById('checkBPO').checked) await buildBPO(d);
        if(document.getElementById('checkDI').checked) await buildDI(d);
    }

    // --- LOGIQUE PA ---
    async function buildPA(d) {
        try {
            const bytes = await fetch('PA.pdf').then(res => res.arrayBuffer());
            const doc = await PDFDocument.load(bytes);
            const page = doc.getPages()[0];
            const write = (t, x, y, size = 12) => { if(t) page.drawText(t.toString(), { x, y, size }) };

            write(d.date, 441, 688);
            write(d.nom, 195, 624); write(d.prenom, 213, 593);
            write(d.age, 195, 561); write(d.tels, 420, 561);
            write(d.adresse, 215, 530);

            const regX = { "MA": 218, "FM": 253, "RM": 293, "SS": 335, "CP": 372 };
            if(regX[d.regime]) write("X", regX[d.regime], 495);
            if(d.regime === "AUTRE") write(d.regime_autre, 459, 498);

            // SÉPARATION MOTIF / DIAGNOSTIC
            write(d.motif.substring(0, 50), 279, 465); // Motif
            write(d.diag.substring(0, 70), 160, 434);  // Diagnostic retenu ligne 2

            // Intervention
            if(d.interv.length > 50) {
                write(d.interv.substring(0, 50), 301, 339);
                write(d.interv.substring(50, 110), 160, 307);
            } else { write(d.interv, 301, 339); }

            write(d.medecin, 392, 129);

            const res = await doc.save();
            download(res, `PA_${d.nom}.pdf`, "application/pdf");
        } catch(e) { console.error(e); }
    }

    // --- LOGIQUE BPO ---
    async function buildBPO(d) {
        try {
            const bytes = await fetch('BPO.pdf').then(res => res.arrayBuffer());
            const doc = await PDFDocument.load(bytes);
            const page = doc.getPages()[0];
            const font = await doc.embedFont(StandardFonts.Helvetica);
            const write = (t, x, y) => { if(t) page.drawText(t, { x, y, size: 12, font }) };
            
            const fullP = `${d.prenom} ${d.nom}`;
            [231, 484, 751].forEach(x => write(d.date, x, 470));
            [70, 341, 615].forEach(x => write(fullP, x, 295));
            const w = font.widthOfTextAtSize(d.medecin, 12);
            [282, 549, 816].forEach(x => write(d.medecin, x - w, 84));

            const res = await doc.save();
            download(res, `BPO_${d.nom}.pdf`, "application/pdf");
        } catch(e) { console.error(e); }
    }

    // --- LOGIQUE DI ---
    async function buildDI(d) {
        try {
            const bytes = await fetch('DI.pdf').then(res => res.arrayBuffer());
            const doc = await PDFDocument.load(bytes);
            const page = doc.getPages()[0];
            const write = (t, x, y) => { if(t) page.drawText(t.toString(), { x, y, size: 12 }) };

            write(d.date, 465, 688);
            write(`${d.nom} ${d.prenom}`, 248, 597);
            if(d.tdm) { write("X", 248, 597); write(d.tdm_reg, 318, 575); }
            if(d.irm) { write("X", 255, 540); write(d.irm_reg, 318, 543); }
            write(d.genre, 243, 458); write(d.age, 390, 458);
            write(d.motif, 218, 410); write(d.diag, 250, 196);
            write(d.medecin, 402, 70);

            const res = await doc.save();
            download(res, `DI_${d.nom}.pdf`, "application/pdf");
        } catch(e) { console.error(e); }
    }
</script>

</body>
</html>
