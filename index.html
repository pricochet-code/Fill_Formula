<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Système Médical Expert - v3.0</title>
    
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/downloadjs@1.4.7/download.js"></script>
    
    <style>
        :root { --blue: #2c3e50; --accent: #2980b9; --orange: #e67e22; --bg: #f4f7f6; --border: #dcdde1; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--blue); padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        
        header { text-align: center; border-bottom: 3px solid var(--accent); margin-bottom: 30px; padding-bottom: 10px; }
        h1 { margin: 0; text-transform: uppercase; font-size: 1.4rem; }

        fieldset { border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 20px; }
        legend { font-weight: bold; color: var(--accent); padding: 0 10px; text-transform: uppercase; font-size: 0.8rem; }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .span-2 { grid-column: span 2; }
        .span-4 { grid-column: span 4; }

        .field { display: flex; flex-direction: column; }
        label { font-size: 0.7rem; font-weight: 700; margin-bottom: 4px; color: #666; }
        input, select, textarea { padding: 10px; border: 1px solid var(--border); border-radius: 5px; font-size: 0.9rem; text-transform: uppercase; }
        input:disabled, textarea:disabled { background: #f1f2f6; }

        .check-row { display: flex; flex-wrap: wrap; gap: 12px; background: #f9f9f9; padding: 10px; border-radius: 5px; align-items: center; }
        .check-item { display: flex; align-items: center; gap: 5px; font-size: 0.85rem; font-weight: 600; }

        .doc-wrap { position: relative; display: flex; align-items: center; }
        .doc-prefix { position: absolute; left: 10px; font-weight: bold; color: var(--accent); }
        .doc-input { padding-left: 40px !important; }

        .action-panel { background: #fff3e0; border: 2px solid var(--orange); padding: 25px; border-radius: 12px; text-align: center; margin-top: 20px; }
        .doc-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; text-align: left; margin-bottom: 20px; }
        .btn-gen { background: var(--orange); color: white; border: none; padding: 15px 40px; font-size: 1.1rem; font-weight: bold; border-radius: 50px; cursor: pointer; transition: 0.3s; width: 100%; }
        .btn-gen:hover { background: #d35400; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container">
    <header><h1>Réservoir de Données & Linking PDF</h1></header>

    <fieldset>
        <legend>1. Identification & Régime</legend>
        <div class="grid">
            <div class="field"><label>Nom</label><input type="text" id="nom"></div>
            <div class="field"><label>Prénom</label><input type="text" id="prenom"></div>
            <div class="field"><label>Âge</label><input type="text" id="age"></div>
            <div class="field">
                <label>Genre</label>
                <select id="genre"><option value="HOMME">HOMME</option><option value="FEMME">FEMME</option><option value="ENFANT">ENFANT</option></select>
            </div>
            <div class="field"><label>Téléphone 1</label><input type="text" id="tel1"></div>
            <div class="field"><label>Téléphone 2</label><input type="text" id="tel2"></div>
            <div class="field">
                <label>Régime</label>
                <select id="regime" onchange="toggleInput('regime', 'regime_autre', 'AUTRE')">
                    <option value="M">M</option><option value="FM">FM</option><option value="RM">RM</option>
                    <option value="SS">SS</option><option value="CP">CP</option><option value="AUTRE">AUTRE</option>
                </select>
            </div>
            <div class="field"><label>Précisez Régime</label><input type="text" id="regime_autre" disabled></div>
            <div class="field span-4"><label>Adresse</label><input type="text" id="adresse"></div>
        </div>
    </fieldset>

    <fieldset>
        <legend>2. Médical & Intervention</legend>
        <div class="grid">
            <div class="field span-2">
                <label>Antécédents</label>
                <div class="check-row">
                    <label class="check-item"><input type="checkbox" id="atcd_diabete"> DIABÈTE</label>
                    <label class="check-item"><input type="checkbox" id="atcd_hta"> HTA</label>
                    <label class="check-item"><input type="checkbox" id="atcd_hypo"> HYPO</label>
                    <label class="check-item"><input type="checkbox" id="atcd_check_autre" onchange="toggleCheck('atcd_check_autre', 'atcd_autre_txt')"> AUTRE</label>
                </div>
                <input type="text" id="atcd_autre_txt" placeholder="AUTRE ATCD" style="margin-top:5px" disabled>
            </div>
            <div class="field span-2"><label>Motif / Diagnostic</label><textarea id="motif" rows="3"></textarea></div>
            <div class="field span-2"><label>Intervention Prévue</label><textarea id="interv" rows="3"></textarea></div>
            <div class="field span-2">
                <label>Médecin</label>
                <div class="doc-wrap">
                    <span class="doc-prefix">DR.</span>
                    <input type="text" id="medecin" class="doc-input">
                </div>
            </div>
        </div>
    </fieldset>

    <section class="action-panel">
        <div class="doc-list">
            <label class="check-item"><input type="checkbox" id="checkPA" checked> PROPOSITION ADMISSION (PA)</label>
            <label class="check-item"><input type="checkbox" id="checkBPO" checked> BILAN PRÉ-OP (BPO)</label>
            <label class="check-item"><input type="checkbox" id="checkDI"> DEMANDE IMAGERIE (DI)</label>
        </div>
        <button class="btn-gen" onclick="genererTousLesPDF()">🚀 GÉNÉRER LES DOCUMENTS (TAILLE 12)</button>
    </section>
</div>

<script>
    const { PDFDocument, StandardFonts } = PDFLib;

    function toggleInput(selectId, targetId, value) { document.getElementById(targetId).disabled = document.getElementById(selectId).value !== value; }
    function toggleCheck(checkId, targetId) { document.getElementById(targetId).disabled = !document.getElementById(checkId).checked; }

    const getV = (id) => document.getElementById(id).value.trim().toUpperCase();

    async function genererTousLesPDF() {
        const d = {
            nom: getV('nom'), prenom: getV('prenom'), age: getV('age'),
            tels: `${getV('tel1')} / ${getV('tel2')}`, adresse: getV('adresse'),
            regime: getV('regime'), regime_autre: getV('regime_autre'),
            motif: getV('motif'), interv: getV('interv'), medecin: "DR. " + getV('medecin'),
            date: new Date().toLocaleDateString('fr-FR'), genre: getV('genre')
        };

        if(document.getElementById('checkPA').checked) await buildPA(d);
        if(document.getElementById('checkBPO').checked) await buildBPO(d);
        if(document.getElementById('checkDI').checked) await buildDI(d);
    }

    // --- FORMULAIRE PA (PORTRAIT) ---
    async function buildPA(d) {
        try {
            const bytes = await fetch('PA.pdf').then(res => res.arrayBuffer());
            const doc = await PDFDocument.load(bytes);
            const page = doc.getPages()[0];
            const write = (t, x, y, size = 12) => { if(t) page.drawText(t.toString(), { x, y, size }) };

            // Identification
            write(d.date, 441, 688);
            write(d.nom, 195, 624);
            write(d.prenom, 213, 593);
            write(d.age, 195, 561);
            write(d.tels, 420, 561);
            write(d.adresse, 215, 530);

            // Régime (X)
            const regX = { "M": 218, "FM": 253, "RM": 293, "SS": 335, "CP": 372 };
            if(regX[d.regime]) write("X", regX[d.regime], 495);
            if(d.regime === "AUTRE") write(d.regime_autre, 459, 498);

            // Médical (Linking intelligent avec split si trop long)
            if(d.motif.length > 55) {
                write(d.motif.substring(0, 55), 279, 465);
                write(d.motif.substring(55, 110), 160, 434);
            } else { write(d.motif, 279, 465); }

            if(d.interv.length > 55) {
                write(d.interv.substring(0, 55), 301, 339);
                write(d.interv.substring(55, 110), 160, 307);
            } else { write(d.interv, 301, 339); }

            write(d.medecin, 392, 129);

            const res = await doc.save();
            download(res, `PA_${d.nom}.pdf`, "application/pdf");
        } catch(e) { console.error("PA Error", e); }
    }

    // --- FORMULAIRE BPO (PAYSAGE - TRI-COUPON) ---
    async function buildBPO(d) {
        try {
            const bytes = await fetch('BPO.pdf').then(res => res.arrayBuffer());
            const doc = await PDFDocument.load(bytes);
            const page = doc.getPages()[0];
            const font = await doc.embedFont(StandardFonts.Helvetica);
            
            const write = (t, x, y) => { if(t) page.drawText(t, { x, y, size: 12, font }) };
            const fullP = `${d.prenom} ${d.nom}`;

            // Dates (Y=470) | Patients (Y=295)
            [231, 484, 751].forEach(x => write(d.date, x, 470));
            [70, 341, 615].forEach(x => write(fullP, x, 295));

            // Médecins (Y=84, aligné droite)
            const w = font.widthOfTextAtSize(d.medecin, 12);
            [282, 549, 816].forEach(x => write(d.medecin, x - w, 84));

            const res = await doc.save();
            download(res, `BPO_${d.nom}.pdf`, "application/pdf");
        } catch(e) { console.error("BPO Error", e); }
    }

    // --- FORMULAIRE DI ---
    async function buildDI(d) {
        try {
            const bytes = await fetch('DI.pdf').then(res => res.arrayBuffer());
            const doc = await PDFDocument.load(bytes);
            const page = doc.getPages()[0];
            const write = (t, x, y) => { if(t) page.drawText(t.toString(), { x, y, size: 12 }) };

            write(d.date, 465, 688);
            write(`${d.nom} ${d.prenom}`, 248, 597);
            write(d.genre, 243, 458);
            write(d.age, 390, 458);
            write(d.motif, 218, 410);
            write(d.medecin, 402, 70);

            const res = await doc.save();
            download(res, `DI_${d.nom}.pdf`, "application/pdf");
        } catch(e) { console.error("DI Error", e); }
    }
</script>
</body>
</html>
